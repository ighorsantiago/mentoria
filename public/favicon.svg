<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Fundo roxo MentorIA -->
  <rect width="32" height="32" rx="7" fill="#7C3AED"/>
  <!-- Chapéu de formatura: losango visto de cima -->
  <polygon points="16,5 28,11 16,17 4,11" fill="white" opacity="0.95"/>
  <!-- Cordão lateral -->
  <line x1="28" y1="11" x2="28" y2="18" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.85"/>
  <!-- Borla dourada -->
  <circle cx="28" cy="19.5" r="2" fill="#F59E0B"/>
  <!-- Estrela / sparkle de IA embaixo -->
  <line x1="16" y1="21" x2="16" y2="27" stroke="white" stroke-width="1.2" stroke-linecap="round" opacity="0.7"/>
  <line x1="13" y1="24" x2="19" y2="24" stroke="white" stroke-width="1.2" stroke-linecap="round" opacity="0.7"/>
  <circle cx="16" cy="24" r="1.5" fill="white" opacity="0.9"/>
</svg>
